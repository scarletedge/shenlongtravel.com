<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理｜升龍旅行社</title>
<meta name="robots" content="noindex, nofollow">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">
<link rel="icon" href="../favicon.ico">
</head>
<body class="admin-body">

<!-- ===== 登入畫面 ===== -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="logo-row">
      <img src="../images/logo.png" alt="升龍旅行社">
      <span style="font-family:'Noto Serif TC';font-weight:700">升龍旅行社</span>
    </div>
    <h1>後台管理登入</h1>
    <p class="sub">員工帳號登入後可編輯網站內容</p>
    <form id="login-form">
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required autocomplete="username">
      </div>
      <div class="field">
        <label for="login-pass">密碼</label>
        <input type="password" id="login-pass" required autocomplete="current-password">
      </div>
      <button type="submit">登入</button>
      <p class="login-error" id="login-error">帳號或密碼錯誤，請再試一次。</p>
    </form>
  </div>
</div>

<!-- ===== 後台主畫面 ===== -->
<div class="admin-shell" id="admin-shell">
  <div class="admin-header">
    <div class="brand"><img src="../images/logo.png" alt="" style="width:22px;height:22px;vertical-align:middle;margin-right:8px">升龍旅行社．後台管理</div>
    <div class="user-info">
      <span id="user-email"></span>
      <button class="logout-btn" id="logout-btn">登出</button>
    </div>
  </div>

  <div class="admin-nav">
    <button class="nav-tab active" data-panel="panel-rates">匯率設定</button>
    <button class="nav-tab" data-panel="panel-visa">簽證價目表</button>
    <button class="nav-tab" data-panel="panel-team">團隊成員</button>
  </div>

  <div class="admin-main">

    <!-- 匯率設定 -->
    <div class="admin-panel active" id="panel-rates">
      <h2>匯率設定</h2>
      <p class="desc">這裡改的數字，會即時反映在簽證頁的計算機與價目表上。來源幣別為人民幣（CNY）。</p>
      <div class="admin-card">
        <div class="admin-row">
          <div class="admin-field">
            <label>1 人民幣 = 多少美金（USD）</label>
            <input type="number" step="0.0001" id="rate-usd" placeholder="例：0.1477">
          </div>
          <div class="admin-field">
            <label>1 人民幣 = 多少越南盾（VND）</label>
            <input type="number" step="1" id="rate-vnd" placeholder="例：3868">
          </div>
        </div>
        <div class="admin-actions">
          <button class="btn-save" id="save-rates">儲存匯率</button>
          <button class="btn-delete" id="fill-default-rates" style="border-color:var(--line-strong);color:var(--muted)">帶入目前預設值</button>
        </div>
      </div>
    </div>

    <!-- 簽證價目表 -->
    <div class="admin-panel" id="panel-visa">
      <h2>簽證價目表</h2>
      <p class="desc">價格請填人民幣（CNY）金額；不確定的項目價格欄位留空，網站會自動顯示「價格詳詢」。排序數字越小越前面。</p>
      <div id="visa-list"></div>
      <div class="admin-actions">
        <button class="btn-add" id="add-visa-row" style="flex:1">＋ 新增一筆價目</button>
        <button class="btn-save" id="seed-visa" style="white-space:nowrap">一鍵匯入現有30筆資料</button>
      </div>
    </div>

    <!-- 團隊成員 -->
    <div class="admin-panel" id="panel-team">
      <h2>團隊成員</h2>
      <p class="desc">「關於我們」頁面的團隊介紹卡片，繁中／簡中內容分開填寫。排序數字越小越前面。</p>
      <div id="team-list"></div>
      <div class="admin-actions">
        <button class="btn-add" id="add-team-row" style="flex:1">＋ 新增一位成員</button>
        <button class="btn-save" id="seed-team" style="white-space:nowrap">一鍵匯入現有4位成員</button>
      </div>
    </div>

  </div>
</div>

<div class="save-toast" id="save-toast">已儲存</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
